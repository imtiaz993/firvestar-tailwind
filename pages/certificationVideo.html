<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Essential Engine - Certification</title>
    <link rel="shortcut icon" href="../public/favicon.ico" />
    <link rel="stylesheet" href="../output.css" />
  </head>
  <body
    class="hidden max-h-dvh min-h-dvh w-384 origin-top-left overflow-hidden"
    id="app-wrapper"
  >
    <section class="relative z-10">
      <div
        class="relative z-10 flex h-40 w-200 items-center justify-center bg-[#0389A0] p-10"
      >
        <h1 class="text-center text-6xl font-bold text-white">
          CERTIFICATION VIDEO
        </h1>
      </div>
      <div class="absolute top-10 left-15 z-0 h-38 w-3xl bg-[#F0592B]"></div>
    </section>
    <div class="relative bottom-10 z-20 flex w-full justify-center">
      <video class="w-220" preload="auto" controls>
        <source
          src="https://ags.s3.amazonaws.com/2026/re/RE26_RecertVideo.mp4"
        />
      </video>
    </div>
    <footer class="relative bottom-20 flex justify-end">
      <div class="flex h-36 w-270 items-center justify-start bg-[#0389A0]">
        <p class="px-7 font-light text-white">
          This short video explains the Award Selection Process, Winner
          Criteria, and Usage Guidelines
        </p>
      </div>
    </footer>
    <script>
      function scalePage() {
        const baseWidth = 1536;
        const scale = window.innerWidth / baseWidth;

        const wrapper = document.getElementById("app-wrapper");
        wrapper.style.transform = "scale(" + scale + ")";
        wrapper.style.display = "block";
      }

      window.addEventListener("resize", scalePage);
      window.addEventListener("load", scalePage);
    </script>
  </body>
</html>
